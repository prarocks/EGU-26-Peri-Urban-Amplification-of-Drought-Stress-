<svg width="100%" viewBox="0 0 720 380" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Policy implications</title>
  <desc>Consolidated EGU-style policy implications for managing urban heat and drought risk.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbfaf7" />
      <stop offset="100%" stop-color="#f2eee6" />
    </linearGradient>
    <linearGradient id="cardGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(209, 232, 226, 0.45)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.95)" />
    </linearGradient>
    <style>
      .body { font-family: Georgia, serif; fill: #1f1c17; }
      .title { font-size: 26px; font-weight: 700; fill: #1f1c17; }
      .subtitle { font-size: 13px; fill: #706a61; }
      .card { fill: #ffffff; stroke: #ddd8cf; stroke-width: 1.2; rx: 18; }
      .card-title { font-size: 14px; font-weight: 600; fill: #1f1c17; }
      .card-text { font-size: 12px; fill: #4f4a42; }
      .accent { fill: #185fa5; }
      .accent-soft { fill: #e6f1fb; }
      .accent-green { fill: #1d9e75; }
      .icon-stroke { fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
      .note { font-size: 11px; fill: #706a61; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="body" fill="url(#bgGrad)" />

  <g transform="translate(40, 30)">
    <text class="title">Policy implications</text>
    <text class="subtitle" y="30">Four practical directions for peri-urban heat and drought resilience at EGU scale.</text>
    <line x1="0" y1="54" x2="640" y2="54" stroke="#c8d8d4" stroke-width="1" />
  </g>

  <g transform="translate(40, 90)">
    <rect x="0" y="0" width="320" height="110" class="card" />
    <rect x="0" y="0" width="320" height="110" rx="18" fill="url(#cardGlow)" />
    <g transform="translate(18, 18)">
      <circle cx="18" cy="18" r="18" class="accent-soft" />
      <path d="M18 6 L28 16 L28 32 H8 V16 Z" class="icon-stroke accent-green" />
      <rect x="12" y="22" width="10" height="10" rx="2" fill="#9fe1cb" stroke="#1d9e75" stroke-width="1.6" />
      <text class="card-title" x="48" y="18">Protect peri-urban green fields</text>
      <text class="card-text" x="48" y="38">Strengthen zoning to limit grassland conversion into impervious land cover.</text>
    </g>
  </g>

  <g transform="translate(360, 90)">
    <rect x="0" y="0" width="320" height="110" class="card" />
    <rect x="0" y="0" width="320" height="110" rx="18" fill="url(#cardGlow)" />
    <g transform="translate(18, 18)">
      <circle cx="18" cy="18" r="18" class="accent-soft" />
      <path d="M12 4 C10 10, 6 16, 12 24 C18 16, 14 10, 12 4 Z" class="accent" />
      <path d="M12 24 C14 22, 16 18, 16 14" class="icon-stroke accent" />
      <text class="card-title" x="48" y="18">Reframe water planning</text>
      <text class="card-text" x="48" y="38">Embed elevated ET₀ into irrigation and resource allocation decisions.</text>
    </g>
  </g>

  <g transform="translate(40, 220)">
    <rect x="0" y="0" width="320" height="110" class="card" />
    <rect x="0" y="0" width="320" height="110" rx="18" fill="url(#cardGlow)" />
    <g transform="translate(18, 18)">
      <circle cx="18" cy="18" r="18" class="accent-soft" />
      <rect x="14" y="8" width="8" height="24" rx="4" fill="#faece7" stroke="#d85a30" stroke-width="1.8" />
      <circle cx="18" cy="32" r="6" fill="#f0997b" stroke="#d85a30" stroke-width="1.8" />
      <text class="card-title" x="48" y="18">Expand heat action plans</text>
      <text class="card-text" x="48" y="38">Include peri-urban transition zones in urban heat risk preparedness.</text>
    </g>
  </g>

  <g transform="translate(360, 220)">
    <rect x="0" y="0" width="320" height="110" class="card" />
    <rect x="0" y="0" width="320" height="110" rx="18" fill="url(#cardGlow)" />
    <g transform="translate(18, 18)">
      <circle cx="18" cy="18" r="18" class="accent-soft" />
      <path d="M18 8 C12 12, 10 18, 18 20 C14 18, 14 14, 18 8 Z" fill="#c0dd97" stroke="#3b6d11" class="icon-stroke" />
      <path d="M18 8 C24 12, 26 18, 18 20 C22 18, 22 14, 18 8 Z" fill="#eaf3de" stroke="#3b6d11" class="icon-stroke" />
      <text class="card-title" x="48" y="18">Grow drought-smart vegetation</text>
      <text class="card-text" x="48" y="38">Prioritize native grasses and shaded corridors for resilience.</text>
    </g>
  </g>

  <text class="note" x="40" y="356">EGU 2026 | Policy summary for peri-urban heat and drought risk management</text>
</svg>
